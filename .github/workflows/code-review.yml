name: Code Review GPT

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop
      - 'release/**'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  code-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Get Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v41
        with:
          files: |
            **/*.ts
            **/*.tsx
            **/*.js
            **/*.jsx
            **/*.json
            **/*.prisma
          files_ignore: |
            **/node_modules/**
            **/dist/**
            **/build/**
            **/.next/**
            **/coverage/**
            **/*.spec.ts
            **/*.spec.tsx
            **/*.test.ts
            **/*.test.tsx
            **/*.md
            **/package-lock.json
            **/yarn.lock
            **/pnpm-lock.yaml

      - name: Code Review with GPT
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: anc95/ChatGPT-CodeReview@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGUAGE: pt-BR
          OPENAI_API_ENDPOINT: https://api.openai.com/v1
          MODEL: gpt-4o
          PROMPT: |
            Você é um revisor de código sênior especializado em aplicações modernas JavaScript/TypeScript.
            
            Stack do Projeto:
            - Monorepo gerenciado por Nx 21
            - Gerenciador de pacotes: pnpm
            - Backend: Fastify
            - ORM/Schema: Zenstack
            - Frontend: React 18+
            - Data Fetching: React Query (TanStack Query)
            
            Revise o código seguindo estas diretrizes:
            
            1. ARQUITETURA E ESTRUTURA NX:
               - Verificar se os limites de bibliotecas estão sendo respeitados
               - Avaliar se o código está na camada correta (apps vs libs)
               - Confirmar uso adequado de path aliases configurados no tsconfig
               - Validar tags e dependências entre projetos Nx
            
            2. BACKEND (Fastify + Zenstack):
               - Validação de schemas de entrada com Zod ou similar
               - Tratamento adequado de erros e status codes HTTP
               - Uso correto de hooks e plugins do Fastify
               - Performance de queries e uso eficiente do Zenstack
               - Segurança: validação de entrada, SQL injection, autenticação
               - Estrutura de rotas e organização de handlers
            
            3. FRONTEND (React + React Query):
               - Componentes funcionais e hooks corretos
               - Gerenciamento de estado adequado (local vs React Query)
               - Configuração correta de queries (staleTime, cacheTime, refetch)
               - Uso adequado de mutations e invalidação de cache
               - Performance: memoização, lazy loading, code splitting
               - Acessibilidade (a11y) e semântica HTML
               - Tipagem TypeScript rigorosa
            
            4. CÓDIGO GERAL:
               - Qualidade e clareza do código
               - Nomenclatura descritiva e consistente
               - Remoção de código comentado ou console.logs
               - Tratamento de edge cases e erros
               - Testes necessários (mencionar se faltam)
               - Performance e possíveis otimizações
               - Segurança e vulnerabilidades
            
            5. PADRÕES DO PROJETO:
               - Consistência com padrões estabelecidos
               - DRY (Don't Repeat Yourself)
               - SOLID principles quando aplicável
               - Clean Code practices
            
            Forneça feedback construtivo, específico e acionável.
            Priorize problemas críticos de segurança e bugs sobre questões estilísticas.
            Sugira melhorias concretas com exemplos de código quando possível.
            Seja conciso mas completo. Use emojis para categorizar: 🔴 crítico, 🟡 importante, 🔵 sugestão, ✅ bom.
          
          top_p: 1
          temperature: 0.7
          max_tokens: 12000
          
      - name: Summary Comment
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const changedFiles = '${{ steps.changed-files.outputs.all_changed_files }}'.split(' ');
            const comment = `
            ## 🤖 Code Review GPT - Resumo
            
            **Arquivos revisados:** ${changedFiles.length}
            **Stack:** Nx 21 + pnpm + Fastify + Zenstack + React + React Query
            
            Os comentários detalhados da revisão foram adicionados aos arquivos modificados.
            
            ### Arquivos analisados:
            ${changedFiles.map(file => `- \`${file}\``).join('\n')}
            
            ---
            *Revisão automática powered by GPT-4 | Configuração otimizada para o stack do projeto*
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: No Changes Detected
        if: steps.changed-files.outputs.any_changed != 'true'
        run: |
          echo "Nenhum arquivo relevante foi modificado neste PR."
          echo "Arquivos ignorados: node_modules, dist, build, testes, etc."